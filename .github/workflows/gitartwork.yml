name: Generate gitartwork

on:
  push:
  pull_request:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  build:
    name: Make gitartwork SVG
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: jasineri/gitartwork@v1
        with:
          user_name: nguyentuanquang2210
          text: QUANG!
      - name: Set Git User
        run: |
          git config user.name "nguyentuanquang2210"
          git config user.email "quangenguyene@gmail.com"
      - uses: jasineri/simple-push-action@v1
