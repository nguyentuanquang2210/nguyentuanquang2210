name: Generate GitArtWork

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Generate GitArtWork
    uses: jasineri/gitartwork@v1
    with:
      user_name: nguyentuanquang2210
      text: QUANG

  - name: List generated files
    run: |
      pwd
      ls -la
      find . -name "*.svg"
```
